name: Improve Existing Idea
description: Improve an existing AI project idea
title: "[Improve] "
labels: ["enhancement"]
body:
  - type: input
    id: idea
    attributes:
      label: Idea file
      description: Which idea should be improved?
      placeholder: ideas/ai-code-reviewer.md
    validations:
      required: true
  - type: textarea
    id: improvement
    attributes:
      label: Improvement
      description: What should be improved or added?
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Why
      description: Why is this improvement useful?
    validations:
      required: false
